<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swarm — HiveMind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ui/static/style.css?v=5">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 30'%3E%3Cpath d='M13 1L24.5 7.5V20.5L13 27L1.5 20.5V7.5L13 1Z' stroke='%23f59e0b' stroke-width='1.5' fill='%23070600'/%3E%3Ccircle cx='13' cy='14.5' r='3' fill='%23f59e0b'/%3E%3C/svg%3E">
  <style>
    html, body { height: 100%; overflow: hidden; }

    /* Layout */
    .swarm-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 1fr;
      height: calc(100vh - 68px);
      margin-top: 68px;
    }

    /* ── Sidebar ── */
    .swarm-sidebar {
      background: rgba(10,9,5,0.95);
      border-right: 1px solid rgba(245,158,11,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid rgba(245,158,11,0.08);
      flex-shrink: 0;
    }

    .sidebar-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .sidebar-search {
      width: 100%;
      background: rgba(245,158,11,0.04);
      border: 1px solid rgba(245,158,11,0.15);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .sidebar-search::placeholder { color: var(--text-dim); }
    .sidebar-search:focus { border-color: rgba(245,158,11,0.4); }

    .sidebar-agents {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px;
    }
    .sidebar-agents::-webkit-scrollbar { width: 3px; }
    .sidebar-agents::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.2); border-radius: 2px; }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .agent-item:hover { background: rgba(245,158,11,0.06); }
    .agent-item.active { background: rgba(245,158,11,0.1); }
    .agent-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 60%;
      background: #f59e0b;
      border-radius: 0 2px 2px 0;
    }

    .agent-item-icon {
      width: 32px; height: 32px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
      color: #f59e0b;
      font-size: 12px;
      font-weight: 700;
    }

    .agent-item-info { flex: 1; min-width: 0; }
    .agent-item-name {
      font-size: 13px; font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .agent-item-slug {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 1px;
    }

    .agent-item-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,0.6);
      flex-shrink: 0;
    }
    .agent-item-dot.inactive { background: var(--text-dim); box-shadow: none; }

    /* ── Main chat ── */
    .swarm-main {
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
      overflow: hidden;
    }

    .chat-topbar {
      height: 56px;
      border-bottom: 1px solid rgba(245,158,11,0.1);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      flex-shrink: 0;
      background: rgba(10,9,5,0.6);
    }

    .chat-topbar-icon {
      width: 34px; height: 34px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 700;
      color: #f59e0b;
    }

    .chat-topbar-info { flex: 1; }
    .chat-topbar-name { font-size: 14px; font-weight: 600; }
    .chat-topbar-slug {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-dim);
    }

    .chat-topbar-status {
      display: flex; align-items: center; gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.1em;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,0.6);
    }
    .status-dot.streaming {
      background: #f59e0b;
      box-shadow: 0 0 8px rgba(245,158,11,0.8);
      animation: pulse-dot 0.8s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    .topbar-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-dim);
      text-decoration: none;
      padding: 5px 10px;
      border: 1px solid rgba(245,158,11,0.15);
      border-radius: 6px;
      transition: all 0.15s;
    }
    .topbar-link:hover { color: #f59e0b; border-color: rgba(245,158,11,0.35); }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.15); border-radius: 2px; }

    /* Empty state */
    .swarm-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-dim);
      gap: 12px;
      padding: 40px;
    }
    .swarm-empty-icon {
      width: 56px; height: 56px;
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      background: rgba(245,158,11,0.04);
      margin-bottom: 4px;
    }
    .swarm-empty h3 { font-size: 16px; color: var(--text-secondary); margin: 0; }
    .swarm-empty p { font-size: 13px; max-width: 280px; margin: 0; line-height: 1.6; }

    /* Message bubbles */
    .msg { display: flex; gap: 12px; max-width: 100%; }
    .msg.msg-user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 700; color: #f59e0b;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .msg-user .msg-avatar {
      background: rgba(139,92,246,0.1);
      border-color: rgba(139,92,246,0.25);
      color: #a78bfa;
    }

    .msg-body { flex: 1; min-width: 0; max-width: 72%; }
    .msg-user .msg-body { display: flex; flex-direction: column; align-items: flex-end; }

    .msg-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-dim);
    }
    .msg-user .msg-meta { flex-direction: row-reverse; }
    .msg-meta-name { color: var(--text-muted); font-weight: 600; }

    .msg-bubble {
      background: rgba(245,158,11,0.06);
      border: 1px solid rgba(245,158,11,0.12);
      border-radius: 4px 12px 12px 12px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-primary);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg-user .msg-bubble {
      background: rgba(139,92,246,0.08);
      border-color: rgba(139,92,246,0.2);
      border-radius: 12px 4px 12px 12px;
      color: var(--text-secondary);
    }

    /* Streaming bubble */
    .msg-bubble.streaming {
      border-color: rgba(245,158,11,0.3);
      background: rgba(245,158,11,0.08);
    }
    .cursor-blink {
      display: inline-block;
      width: 2px; height: 14px;
      background: #f59e0b;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Log lines inside bubble */
    .log-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(245,158,11,0.1);
    }
    .log-line {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--text-dim);
      line-height: 1.6;
      display: flex; gap: 8px;
    }
    .log-prefix { color: rgba(245,158,11,0.4); flex-shrink: 0; }

    /* Sub-agent call badge */
    .sub-call {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 6px 0;
      padding: 4px 10px 4px 8px;
      background: rgba(245,158,11,0.06);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #f59e0b;
    }
    .sub-call-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 5px rgba(245,158,11,0.7);
    }

    /* Error bubble */
    .msg-bubble.error-bubble {
      background: rgba(239,68,68,0.06);
      border-color: rgba(239,68,68,0.2);
      color: #fca5a5;
    }

    /* Duration badge */
    .msg-duration {
      margin-top: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
    }

    /* ── Input area ── */
    .chat-input-area {
      padding: 12px 24px 20px;
      border-top: 1px solid rgba(245,158,11,0.08);
      background: rgba(10,9,5,0.5);
      flex-shrink: 0;
    }

    .input-agent-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .input-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .agent-select {
      flex: 1;
      background: rgba(245,158,11,0.04);
      border: 1px solid rgba(245,158,11,0.15);
      border-radius: 8px;
      padding: 7px 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .agent-select:focus { border-color: rgba(245,158,11,0.4); }
    .agent-select option { background: #0a0905; }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-textarea {
      flex: 1;
      min-height: 44px;
      max-height: 140px;
      resize: none;
      background: rgba(245,158,11,0.04);
      border: 1px solid rgba(245,158,11,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .chat-textarea::placeholder { color: var(--text-dim); }
    .chat-textarea:focus { border-color: rgba(245,158,11,0.35); }

    .send-btn {
      height: 44px;
      padding: 0 18px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none;
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #060500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
      display: flex; align-items: center; gap: 7px;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-btn svg { flex-shrink: 0; }

    /* No agent selected state */
    .no-agent-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      text-align: center;
      padding: 40px;
      gap: 16px;
    }

    /* ── Canvas decorative ── */
    .swarm-canvas-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* Misc */
    .tag-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(245,158,11,0.1);
      color: #f59e0b;
      border: 1px solid rgba(245,158,11,0.2);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/ui/" class="logo">
      <div class="logo-top">
        <svg class="logo-mark" width="26" height="30" viewBox="0 0 26 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 1L24.5 7.5V20.5L13 27L1.5 20.5V7.5L13 1Z" stroke="#f59e0b" stroke-width="1.5" fill="none"/>
          <path d="M13 7.5L19 11V18L13 21.5L7 18V11L13 7.5Z" stroke="#f59e0b" stroke-width="1" fill="rgba(245,158,11,0.06)"/>

    <div class="nav-links">
      <a href="/ui/marketplace.html">Agents</a>
      <a href="/ui/demo.html">Demo</a>
      <a href="/ui/dashboard.html">Dashboard</a>
      <a href="/ui/upload.html">Deploy</a>

    </div>
  </div>
</nav>

<div class="swarm-layout">

  <!-- Sidebar -->
  <div class="swarm-sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">⬡ Agent Directory</div>
      <input class="sidebar-search" id="sidebar-search" type="text" placeholder="Search agents..." autocomplete="off">
    </div>
    <div class="sidebar-agents" id="sidebar-agents">
      <div style="text-align:center;padding:32px 16px;color:var(--text-dim)">
        <div class="spinner" style="margin:0 auto 10px;width:18px;height:18px;border-width:2px"></div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="swarm-main" id="swarm-main">

    <!-- No agent selected -->
    <div class="no-agent-state" id="no-agent-state">
      <svg width="52" height="60" viewBox="0 0 26 30" fill="none" style="opacity:0.2">
        <path d="M13 1L24.5 7.5V20.5L13 27L1.5 20.5V7.5L13 1Z" stroke="#f59e0b" stroke-width="1.5"/>
        <path d="M13 7.5L19 11V18L13 21.5L7 18V11L13 7.5Z" stroke="#f59e0b" stroke-width="1"/>
        <circle cx="13" cy="14.5" r="2.5" fill="#f59e0b"/>
      </svg>
      <div>
        <h3 style="font-size:15px;color:var(--text-muted);margin:0 0 6px">Select an Agent</h3>
        <p style="font-size:13px;margin:0;max-width:240px;line-height:1.6">Choose an agent from the directory to start a conversation</p>
      </div>
    </div>

    <!-- Chat UI (hidden until agent selected) -->
    <div id="chat-ui" style="display:none;flex-direction:column;height:100%;overflow:hidden">

      <!-- Topbar -->
      <div class="chat-topbar" id="chat-topbar">
        <div class="chat-topbar-icon" id="topbar-icon"></div>
        <div class="chat-topbar-info">
          <div class="chat-topbar-name" id="topbar-name"></div>
          <div class="chat-topbar-slug" id="topbar-slug"></div>
        </div>
        <div class="chat-topbar-status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-label">Ready</span>
        </div>
        <a class="topbar-link" id="topbar-detail-link" href="#">View Details →</a>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chat-messages">
        <!-- welcome message injected by JS -->
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="input-row">
          <textarea
            class="chat-textarea"
            id="chat-input"
            placeholder="Send a task or message to the agent…"
            rows="1"
          ></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Run
          </button>
        </div>
      </div>

    </div>

  </div>
</div>

<script src="/ui/static/app.js"></script>
<script>
  initNav();

  let allAgents = [];
  let selectedAgent = null;
  let isStreaming = false;
  let conversations = {}; // slug → [{role, content, logs, duration_ms}]

  // ── Load agents ──────────────────────────────────────────────────
  async function loadAgents() {
    try {
      const data = await apiFetch('GET', '/api/v1/agents?sort=popular&limit=100');
      allAgents = data.agents || [];
      renderSidebar(allAgents);
    } catch(e) {
      document.getElementById('sidebar-agents').innerHTML =
        `<div style="padding:20px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);text-align:center">Failed to load agents</div>`;
    }
  }

  function agentInitial(name) {
    if (!name) return '?';
    const parts = name.trim().split(/[\s\/]+/);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return name.slice(0, 2).toUpperCase();
  }

  function renderSidebar(agents) {
    const el = document.getElementById('sidebar-agents');
    if (!agents.length) {
      el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">No agents found</div>';
      return;
    }
    el.innerHTML = agents.map(a => `
      <div class="agent-item ${selectedAgent && selectedAgent.slug === a.slug ? 'active' : ''}"
           data-slug="${esc(a.slug)}">
        <div class="agent-item-icon">${esc(agentInitial(a.name))}</div>
        <div class="agent-item-info">
          <div class="agent-item-name">${esc(a.name)}</div>
          <div class="agent-item-slug">${esc(a.slug)}</div>
        </div>
        <div class="agent-item-dot ${a.is_active ? '' : 'inactive'}"></div>
      </div>
    `).join('');

    el.querySelectorAll('.agent-item').forEach(item => {
      item.addEventListener('click', () => {
        const a = allAgents.find(x => x.slug === item.dataset.slug);
        if (a) selectAgentObj(a);
      });
    });
  }

  // search
  document.getElementById('sidebar-search').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    const filtered = q ? allAgents.filter(a =>
      a.name.toLowerCase().includes(q) || a.slug.toLowerCase().includes(q) ||
      (a.category || '').toLowerCase().includes(q)
    ) : allAgents;
    renderSidebar(filtered);
    // re-highlight active
    document.querySelectorAll('.agent-item').forEach(el => {
      if (selectedAgent && el.dataset.slug === selectedAgent.slug) el.classList.add('active');
    });
  });

  function selectAgentObj(a) {
    selectedAgent = a;

    // update sidebar highlight
    document.querySelectorAll('.agent-item').forEach(el => {
      el.classList.toggle('active', el.dataset.slug === a.slug);
    });

    // update topbar
    document.getElementById('topbar-icon').textContent = agentInitial(a.name);
    document.getElementById('topbar-name').textContent = a.name;
    document.getElementById('topbar-slug').textContent = a.slug;
    document.getElementById('topbar-detail-link').href = `/ui/agent-detail.html?slug=${encodeURIComponent(a.slug)}`;
    setStatus('ready');

    // show chat UI
    document.getElementById('no-agent-state').style.display = 'none';
    const chatUI = document.getElementById('chat-ui');
    chatUI.style.display = 'flex';

    // restore or init conversation
    if (!conversations[a.slug]) {
      conversations[a.slug] = [];
      renderMessages(a.slug);
      // Welcome message
      appendSystemMessage(`Connected to **${a.name}**. Send a task or question to get started.`);
    } else {
      renderMessages(a.slug);
    }

    // focus input
    setTimeout(() => document.getElementById('chat-input').focus(), 50);
  }

  // ── Messages ──────────────────────────────────────────────────────
  function renderMessages(slug) {
    const msgs = conversations[slug] || [];
    const container = document.getElementById('chat-messages');
    if (!msgs.length) { container.innerHTML = ''; return; }
    container.innerHTML = msgs.map(m => renderMsgHTML(m)).join('');
    scrollToBottom();
  }

  function renderMsgHTML(m) {
    if (m.role === 'system') {
      return `<div style="text-align:center;padding:4px 0">
        <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim)">${escapeHtml(m.content)}</span>
      </div>`;
    }

    const isUser = m.role === 'user';
    const initial = isUser ? 'ME' : agentInitial(selectedAgent ? selectedAgent.name : '??');
    const name = isUser ? 'You' : (selectedAgent ? selectedAgent.name : 'Agent');
    const time = m.time ? `· ${m.time}` : '';

    let bubbleContent = escapeHtml(m.content || '');
    if (m.streaming) bubbleContent += '<span class="cursor-blink"></span>';

    let logsHtml = '';
    if (m.logs && m.logs.length) {
      logsHtml = `<div class="log-section">${m.logs.map(l => `
        <div class="log-line"><span class="log-prefix">›</span><span>${escapeHtml(l)}</span></div>
      `).join('')}</div>`;
    }

    let subCallsHtml = '';
    if (m.subCalls && m.subCalls.length) {
      subCallsHtml = m.subCalls.map(sc => `
        <div><span class="sub-call"><span class="sub-call-dot"></span>Called: ${escapeHtml(sc)}</span></div>
      `).join('');
    }

    const durationHtml = m.duration_ms
      ? `<div class="msg-duration">${(m.duration_ms/1000).toFixed(2)}s</div>` : '';

    const bubbleClass = `msg-bubble${m.streaming ? ' streaming' : ''}${m.error ? ' error-bubble' : ''}`;

    return `<div class="msg ${isUser ? 'msg-user' : ''}" data-msg-id="${m.id || ''}">
      <div class="msg-avatar">${initial}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-meta-name">${escapeHtml(name)}</span>
          <span>${time}</span>
          ${m.execId ? `<span style="opacity:0.5">#${m.execId.slice(0,8)}</span>` : ''}
        </div>
        <div class="${bubbleClass}">${bubbleContent}${logsHtml}</div>
        ${subCallsHtml}
        ${durationHtml}
      </div>
    </div>`;
  }

  function appendSystemMessage(text) {
    if (!selectedAgent) return;
    const slug = selectedAgent.slug;
    if (!conversations[slug]) conversations[slug] = [];
    conversations[slug].push({ role: 'system', content: text, id: uid() });
    renderMessages(slug);
  }

  function appendUserMessage(text) {
    const slug = selectedAgent.slug;
    const msg = { role: 'user', content: text, time: nowTime(), id: uid() };
    conversations[slug].push(msg);
    renderMessages(slug);
  }

  function appendAgentMessage(partial) {
    const slug = selectedAgent.slug;
    const msg = { role: 'agent', content: '', streaming: true, logs: [], subCalls: [], time: nowTime(), id: uid(), ...partial };
    conversations[slug].push(msg);
    renderMessages(slug);
    return msg;
  }

  function updateStreamingMessage(msg, patch) {
    Object.assign(msg, patch);
    const slug = selectedAgent.slug;
    renderMessages(slug);
    scrollToBottom();
  }

  function extractText(val) {
    if (!val) return '';
    if (typeof val === 'string') return val;
    if (typeof val === 'object') {
      // Common fields agents return
      if (val.text) return val.text;
      if (val.message) return val.message;
      if (val.response) return val.response;
      if (val.result) return extractText(val.result);
      if (val.output) return extractText(val.output);
      if (val.content) return extractText(val.content);
      return JSON.stringify(val, null, 2);
    }
    return String(val);
  }

  function finalizeMessage(msg, result) {
    msg.streaming = false;
    msg.content = extractText(result.output) || msg.content || '';
    msg.duration_ms = result.duration_ms;
    msg.execId = result.id;
    if (result.error) { msg.error = true; msg.content = extractText(result.error); }
    renderMessages(selectedAgent.slug);
    scrollToBottom();
  }

  // ── Send ──────────────────────────────────────────────────────────
  async function sendMessage() {
    if (isStreaming || !selectedAgent) return;
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    if (!isLoggedIn()) { showJoinModal(); return; }

    input.value = '';
    resizeTextarea(input);

    appendUserMessage(text);

    const agentMsg = appendAgentMessage({ execId: null });
    setStatus('streaming');
    setSendDisabled(true);
    isStreaming = true;

    try {
      // 1. Start execution
      const execData = await apiFetch('POST', '/api/v1/execute', {
        agent_slug: selectedAgent.slug,
        input: { message: text, query: text, text: text }
      });
      const execId = execData.id;
      agentMsg.execId = execId;

      // 2. Stream SSE
      const token = localStorage.getItem('hivemind_token');
      const eventSource = new EventSource(`/api/v1/executions/${execId}/stream`);
      // Use fetch for auth header since EventSource doesn't support custom headers
      await streamWithFetch(execId, token, agentMsg);

    } catch(e) {
      updateStreamingMessage(agentMsg, {
        streaming: false,
        error: true,
        content: e.message || 'Execution failed'
      });
      setStatus('error');
    } finally {
      isStreaming = false;
      setSendDisabled(false);
      setStatus('ready');
    }
  }

  async function streamWithFetch(execId, token, agentMsg) {
    const headers = { 'Accept': 'text/event-stream' };
    if (token) headers['Authorization'] = `Bearer ${token}`;

    let response;
    try {
      response = await fetch(`/api/v1/executions/${execId}/stream`, { headers });
    } catch(e) {
      throw new Error('Stream connection failed');
    }

    if (!response.ok) throw new Error(`Stream error ${response.status}`);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let streamText = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '__DONE__') {
          // Fetch final result
          try {
            const result = await apiFetch('GET', `/api/v1/executions/${execId}`);
            finalizeMessage(agentMsg, { ...result, id: execId });
          } catch(e) {
            agentMsg.streaming = false;
            renderMessages(selectedAgent.slug);
          }
          return;
        }

        // Parse SSE data
        try {
          const parsed = JSON.parse(data);
          if (parsed.log) {
            agentMsg.logs.push(parsed.log);
          } else if (parsed.output || parsed.text || parsed.content) {
            streamText = parsed.output || parsed.text || parsed.content || '';
            agentMsg.content = streamText;
          } else if (parsed.sub_call || parsed.called_agent) {
            const called = parsed.sub_call || parsed.called_agent;
            agentMsg.subCalls.push(called);
          } else if (typeof parsed === 'string') {
            streamText += parsed;
            agentMsg.content = streamText;
          }
        } catch {
          // plain text chunk
          if (data && data !== '__DONE__') {
            streamText += data;
            agentMsg.content = streamText;
          }
        }

        updateStreamingMessage(agentMsg, {});
      }
    }

    // If we exit without __DONE__, still finalize
    try {
      const result = await apiFetch('GET', `/api/v1/executions/${execId}`);
      finalizeMessage(agentMsg, { ...result, id: execId });
    } catch {
      agentMsg.streaming = false;
      renderMessages(selectedAgent && selectedAgent.slug);
    }
  }

  // ── UI Helpers ────────────────────────────────────────────────────
  function setStatus(state) {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-label');
    if (!dot) return;
    dot.className = 'status-dot' + (state === 'streaming' ? ' streaming' : '');
    if (state === 'streaming') {
      dot.style.background = '#f59e0b';
      label.textContent = 'Running…';
    } else if (state === 'error') {
      dot.style.background = '#ef4444';
      label.textContent = 'Error';
    } else {
      dot.style.background = '#22c55e';
      label.textContent = 'Ready';
    }
  }

  function setSendDisabled(v) {
    const btn = document.getElementById('send-btn');
    if (btn) btn.disabled = v;
  }

  function scrollToBottom() {
    const el = document.getElementById('chat-messages');
    if (el) el.scrollTop = el.scrollHeight;
  }

  function nowTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function uid() {
    return Math.random().toString(36).slice(2, 10);
  }

  function escapeHtml(s) {
    if (!s) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function esc(s) { return escapeHtml(s); }

  // Auto-resize textarea
  const chatInput = document.getElementById('chat-input');
  chatInput.addEventListener('input', function() { resizeTextarea(this); });
  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function resizeTextarea(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  // ── Boot ──────────────────────────────────────────────────────────
  loadAgents();

  // If slug in URL, auto-select
  const urlSlug = new URLSearchParams(location.search).get('agent');
  if (urlSlug) {
    // wait for agents to load then select
    const waitAndSelect = setInterval(() => {
      if (allAgents.length) {
        clearInterval(waitAndSelect);
        const a = allAgents.find(x => x.slug === urlSlug);
        if (a) selectAgentObj(a);
      }
    }, 100);
  }
</script>
</body>
